<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendário de Eventos | Caminho da Roça</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-color: #f5f5f5;
      padding-bottom: 86px;
    }

    .header {
      background-color: #006D60;
      color: white;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calendar-page {
      padding: 20px 18px 16px;
    }

    .page-title {
      margin-bottom: 18px;
    }

    .page-title h2 {
      margin: 0 0 6px;
      color: #006D60;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .page-title p {
      margin: 0;
      color: #66706c;
      font-size: 0.92rem;
      line-height: 1.4;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 16px;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar {
      display: none;
    }

    .filter-chip {
      white-space: nowrap;
      border-radius: 999px;
      padding: 8px 14px;
      background: #ffffff;
      border: 1px solid #dfe7e4;
      color: #5a6a66;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .filter-chip.active {
      background: #006D60;
      border-color: #006D60;
      color: #ffffff;
    }

    .calendar-card,
    .day-events-card {
      background: #ffffff;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 16px;
    }

    .calendar-month-label {
      color: #006D60;
      font-size: 1.02rem;
      font-weight: 700;
      text-transform: capitalize;
      margin: 0;
    }

    .month-nav {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      border: 1px solid #dbe7e3;
      background: #f8fbfa;
      color: #006D60;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .month-nav:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .weekday-row,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekday-row {
      margin-bottom: 10px;
    }

    .weekday {
      text-align: center;
      color: #7a8682;
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .calendar-day {
      min-height: 68px;
      border: 1px solid #e4ece9;
      border-radius: 16px;
      background: #ffffff;
      color: #29443d;
      position: relative;
      padding: 10px 8px 30px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .calendar-day:disabled {
      background: #f8faf9;
      color: #b0bbb7;
      cursor: default;
    }

    .calendar-day.has-event {
      border-color: #b9d9d1;
      background: #f4fbf8;
    }

    .calendar-day.selected {
      border-color: #006D60;
      box-shadow: inset 0 0 0 1px #006D60;
    }

    .calendar-day-number {
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1;
      display: block;
    }

    .calendar-marker {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
    }

    .calendar-dot,
    .calendar-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: #62B55A;
      color: #ffffff;
    }

    .calendar-dot {
      width: 8px;
      height: 8px;
    }

    .calendar-count {
      min-width: 22px;
      height: 18px;
      padding: 0 7px;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .day-events-card {
      margin-top: 16px;
      display: none;
    }

    .day-events-card.is-visible {
      display: block;
    }

    .day-events-card h3 {
      margin: 0 0 6px;
      color: #006D60;
      font-size: 1rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .day-events-card p {
      margin: 0 0 14px;
      color: #66706c;
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .day-event-list {
      display: grid;
      gap: 12px;
    }

    .day-event-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border: 1px solid #e2ebe7;
      border-radius: 18px;
      text-decoration: none;
      color: inherit;
      background: #fbfdfc;
    }

    .day-event-item img {
      width: 68px;
      height: 68px;
      border-radius: 14px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .day-event-item strong {
      display: block;
      color: #006D60;
      font-size: 0.92rem;
      margin-bottom: 4px;
    }

    .day-event-item span {
      display: block;
      color: #67716d;
      font-size: 0.82rem;
      line-height: 1.4;
    }

    .day-event-arrow {
      margin-left: auto;
      color: #62B55A;
      font-size: 0.92rem;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background-color: #ffffff;
      border-top: 1px solid #ddd;
      box-shadow: 0 -1px 5px rgba(0, 0, 0, 0.05);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 999;
    }

    .bottom-nav a {
      text-decoration: none;
      color: #888;
      font-size: 12px;
      text-align: center;
      flex: 1;
      transition: color 0.2s;
    }

    .bottom-nav a.active {
      color: #006D60;
      font-weight: 600;
    }

    .bottom-nav i {
      display: block;
      font-size: 20px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <nav class="navbar header text-white px-3 py-2" style="max-height: 60px;">
    <h1 class="navbar-brand mb-0 h5 text-white text-center w-100">
      <img src="assets/logo-caminho.png" alt="Caminho da Roça" style="margin-top: -30px; height: 100px;">
    </h1>
  </nav>

  <main class="calendar-page">
    <div class="page-title">
      <h2>Calendário de eventos</h2>
      <p>Veja os eventos do m&ecirc;s. Dias com programa&ccedil;&atilde;o aparecem marcados no calend&aacute;rio.</p>
    </div>

    <div class="filter-row">
      <a class="filter-chip" href="eventos.html">Pr&oacute;ximos</a>
      <a class="filter-chip" href="eventos.html" data-expired-link>Expirados</a>
      <span class="filter-chip active">Calend&aacute;rio</span>
    </div>

    <section class="calendar-card">
      <div class="calendar-header">
        <button type="button" class="month-nav" id="prevMonth" aria-label="Mês anterior">
          <i class="fas fa-chevron-left"></i>
        </button>
        <h3 class="calendar-month-label" id="calendarMonthLabel"></h3>
        <button type="button" class="month-nav" id="nextMonth" aria-label="Próximo mês">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>

      <div class="weekday-row">
        <div class="weekday">Dom</div>
        <div class="weekday">Seg</div>
        <div class="weekday">Ter</div>
        <div class="weekday">Qua</div>
        <div class="weekday">Qui</div>
        <div class="weekday">Sex</div>
        <div class="weekday">Sáb</div>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <section class="day-events-card" id="dayEventsCard">
      <h3 id="dayEventsTitle"></h3>
      <p id="dayEventsText"></p>
      <div class="day-event-list" id="dayEventList"></div>
    </section>
  </main>

  <div class="bottom-nav">
    <a href="home.html">
      <i class="fas fa-home"></i>
      Início
    </a>
    <a href="mapa.html">
      <i class="fas fa-map-marked-alt"></i>
      Mapa
    </a>
    <a href="parceiros.html">
      <i class="fas fa-handshake"></i>
      Parceiros
    </a>
    <a href="#" data-bs-toggle="modal" data-bs-target="#modalMinhaConta">
      <i class="fas fa-user"></i>
      Minha Conta
    </a>
  </div>

  <div class="modal fade" id="modalMinhaConta" tabindex="-1" aria-labelledby="modalMinhaContaLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header d-flex justify-content-between align-items-center">
          <h5 class="modal-title fw-bold" id="modalMinhaContaLabel">Minha Conta</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>
        <div class="modal-body text-center">
          <img src="https://i.pravatar.cc/150?img=1" alt="Foto do usuário" class="rounded-circle mb-2" width="100" height="100">
          <h6 class="fw-bold">João da Silva</h6>

          <div class="list-group mt-4">
            <a href="cadastro.html" class="list-group-item list-group-item-action border-0 border-bottom d-flex align-items-center py-3 px-4 bg-white" style="border-color: #eee;">
              <i class="fas fa-user text-success me-3 fs-5"></i>
              <span class="fw-medium">Meus Dados</span>
            </a>
            <a href="termodeuso.html" class="list-group-item list-group-item-action border-0 border-bottom d-flex align-items-center py-3 px-4 bg-white" style="border-color: #eee;">
              <i class="fas fa-file-alt text-success me-3 fs-5"></i>
              <span class="fw-medium">Termo de Uso</span>
            </a>
            <a href="index.html" class="list-group-item list-group-item-action border-0 d-flex align-items-center py-3 px-4 text-danger bg-white">
              <i class="fas fa-sign-out-alt me-3 fs-5"></i>
              <span class="fw-medium">Sair</span>
            </a>
          </div>

          <p class="text-muted mt-5 small">Versão 1.0.0</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/eventos-data.js"></script>
  <script>
    const links = document.querySelectorAll('.bottom-nav a');
    const currentPage = location.pathname.split('/').pop();
    const calendarGrid = document.getElementById('calendarGrid');
    const calendarMonthLabel = document.getElementById('calendarMonthLabel');
    const dayEventsCard = document.getElementById('dayEventsCard');
    const dayEventsTitle = document.getElementById('dayEventsTitle');
    const dayEventsText = document.getElementById('dayEventsText');
    const dayEventList = document.getElementById('dayEventList');
    const prevMonthButton = document.getElementById('prevMonth');
    const nextMonthButton = document.getElementById('nextMonth');
    const expiredLink = document.querySelector('[data-expired-link]');
    const monthKeys = window.CaminhoEvents.getUpcomingMonths();
    let monthIndex = 0;
    let selectedDate = '';

    expiredLink.href = 'eventos.html?status=expired';

    links.forEach(link => {
      const linkPage = link.getAttribute('href');
      if (linkPage === currentPage) {
        link.classList.add('active');
      }
    });

    function getEventCount(dateString) {
      return window.CaminhoEvents.getEventsOnDate(dateString).length;
    }

    function renderSelectedDay(dateString) {
      const events = window.CaminhoEvents.getEventsOnDate(dateString);

      if (events.length <= 1) {
        dayEventsCard.classList.remove('is-visible');
        return;
      }

      dayEventsTitle.textContent = `Eventos em ${window.CaminhoEvents.formatFullDay(dateString)}`;
      dayEventsText.textContent = 'Escolha um evento para ver os detalhes.';
      dayEventList.innerHTML = events.map(event => `
        <a href="evento-detalhe.html?id=${event.id}" class="day-event-item">
          <img src="${event.image}" alt="${event.title}">
          <div>
            <strong>${event.title}</strong>
            <span>${event.dateLabel} • ${event.location}</span>
          </div>
          <i class="fas fa-chevron-right day-event-arrow"></i>
        </a>
      `).join('');
      dayEventsCard.classList.add('is-visible');
    }

    function handleDateClick(dateString) {
      const events = window.CaminhoEvents.getEventsOnDate(dateString);

      if (!events.length) {
        return;
      }

      selectedDate = dateString;

      if (events.length === 1) {
        window.location.href = `evento-detalhe.html?id=${events[0].id}`;
        return;
      }

      renderCalendar();
      renderSelectedDay(dateString);
    }

    function createCalendarCell(dayNumber, dateString, count) {
      const classes = ['calendar-day'];

      if (count) {
        classes.push('has-event');
      }

      if (selectedDate === dateString) {
        classes.push('selected');
      }

      const marker = count > 1
        ? `<span class="calendar-count">${count}</span>`
        : count === 1
          ? '<span class="calendar-dot"></span>'
          : '';

      return `
        <button type="button" class="${classes.join(' ')}" ${count ? '' : 'disabled'} data-date="${dateString}">
          <span class="calendar-day-number">${dayNumber}</span>
          <span class="calendar-marker">${marker}</span>
        </button>
      `;
    }

    function renderCalendar() {
      const monthKey = monthKeys[monthIndex];
      const monthDate = new Date(`${monthKey}-01T00:00:00Z`);
      const year = monthDate.getUTCFullYear();
      const month = monthDate.getUTCMonth();
      const firstDay = new Date(Date.UTC(year, month, 1)).getUTCDay();
      const daysInMonth = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
      const cells = [];

      calendarMonthLabel.textContent = window.CaminhoEvents.formatMonthLabel(monthKey);

      for (let index = 0; index < firstDay; index += 1) {
        cells.push('<button type="button" class="calendar-day" disabled aria-hidden="true"></button>');
      }

      for (let day = 1; day <= daysInMonth; day += 1) {
        const dateString = `${monthKey}-${String(day).padStart(2, '0')}`;
        const count = getEventCount(dateString);
        cells.push(createCalendarCell(day, dateString, count));
      }

      calendarGrid.innerHTML = cells.join('');

      prevMonthButton.disabled = monthIndex === 0;
      nextMonthButton.disabled = monthIndex === monthKeys.length - 1;

      calendarGrid.querySelectorAll('[data-date]').forEach(button => {
        button.addEventListener('click', () => handleDateClick(button.getAttribute('data-date')));
      });
    }

    prevMonthButton.addEventListener('click', () => {
      if (monthIndex === 0) {
        return;
      }

      monthIndex -= 1;
      selectedDate = '';
      dayEventsCard.classList.remove('is-visible');
      renderCalendar();
    });

    nextMonthButton.addEventListener('click', () => {
      if (monthIndex === monthKeys.length - 1) {
        return;
      }

      monthIndex += 1;
      selectedDate = '';
      dayEventsCard.classList.remove('is-visible');
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
