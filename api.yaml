openapi: 3.0.0
info:
  title: API do Projeto
  version: 1.0.0
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OpeningHoursDay:
      type: object
      properties:
        open:
          type: string
          format: time
          example: "08:00"
          description: Horário de abertura no formato HH:mm
        close:
          type: string
          format: time
          example: "18:00"
          description: Horário de fechamento no formato HH:mm
        lunchBreak:
          type: boolean
          example: true
          description: Indica se a propriedade fecha para almoço neste dia
    OpeningHours:
      type: object
      properties:
        monday:
          $ref: '#/components/schemas/OpeningHoursDay'
        tuesday:
          $ref: '#/components/schemas/OpeningHoursDay'
        wednesday:
          $ref: '#/components/schemas/OpeningHoursDay'
        thursday:
          $ref: '#/components/schemas/OpeningHoursDay'
        friday:
          $ref: '#/components/schemas/OpeningHoursDay'
        saturday:
          $ref: '#/components/schemas/OpeningHoursDay'
        sunday:
          $ref: '#/components/schemas/OpeningHoursDay'
        custom:
          type: string
          description: "Horário de funcionamento com agendamento ou personalizado"
      description: Horários de funcionamento da propriedade para todos os dias da semana
paths:
  /api/login:
    post:
      summary: Realiza login do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
              required:
                - email
                - password
            example:
              email: "user@email.com"
              password: "123456"
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  avatar:
                    type: string
                    format: uri
                  email:
                    type: string
                    format: email
                  state:
                    type: string
                  ageRange:
                    type: string
                  travelWith:
                    type: array
                    items:
                      type: string
                  category:
                    type: number
                  subcategories:
                    type: array
                    items:
                      type: number
                  token:
                    type: string
              example:
                id: 1
                name: "Alice"
                avatar: "https://picsum.photos/200/300"
                email: "alice@email.com"
                state: "SP"
                ageRange: "FROM_18_TO_29"
                travelWith: ["FRIENDS"]
                category: 3
                subcategories: [5, 6]
                token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
        '422':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
              example:
                message: "Os dados informados são inválidos."
                errors:
                  email: ["Usuário não encontrado. Verifique suas credenciais de login e senha."]
  /api/password/forgot:
    post:
      summary: Recuperação de senha
      description: Envia um e-mail com instruções de recuperação de senha para o usuário, caso o e-mail esteja cadastrado.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              required:
                - email
            example:
              email: "user@email.com"
      responses:
        '200':
          description: E-mail de recuperação enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "E-mail de recuperação enviado com sucesso."
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: "Usuário não encontrado."
  /api/states:
    get:
      summary: Lista de estados
      responses:
        '200':
          description: Lista de estados brasileiros
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    label:
                      type: string
              example:
                - value: "AC"
                  label: "Acre"
                - value: "AL"
                  label: "Alagoas"
                - value: "AM"
                  label: "Amazonas"
  /api/cities:
    get:
      summary: Lista de cidades brasileiras
      parameters:
        - in: query
          name: uf
          schema:
            type: string
          description: Filtra cidades pelo UF do estado (opcional)
      responses:
        '200':
          description: Lista de cidades
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: integer
                      description: ID da cidade
                    label:
                      type: string
                      description: Nome da cidade
              example:
                - value: 1
                  label: "Rio Branco"
                - value: 2
                  label: "Cruzeiro do Sul"
                - value: 3
                  label: "Maceió"
                - value: 4
                  label: "Arapiraca"
                - value: 5
                  label: "Manaus"
                - value: 6
                  label: "Parintins"
  /api/categories:
    get:
      summary: Lista de categorias
      responses:
        '200':
          description: Lista de categorias disponíveis
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: integer
                    label:
                      type: string
              example:
                - value: 1
                  label: "Tecnologia"
                - value: 2
                  label: "Saúde"
                - value: 3
                  label: "Finanças"
                - value: 4
                  label: "Educação"
  /api/subcategories:
    get:
      summary: Lista de subcategorias de uma ou mais categorias
      parameters:
        - in: query
          name: categoryIds
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filtra subcategorias pelos IDs das categorias
      responses:
        '200':
          description: Lista de subcategorias filtradas pelas categorias informadas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: integer
                      description: ID da subcategoria
                    label:
                      type: string
                      description: Nome da subcategoria
              example:
                - value: 1
                  label: "Smartphones"
                - value: 2
                  label: "Computadores"
                - value: 3
                  label: "Tablets"
                - value: 4
                  label: "Acessórios"
  /api/register/personal-data:
    post:
      summary: Cadastro - Etapa 1 (Dados básicos)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                state:
                  type: string
                ageRange:
                  type: string
                travelWith:
                    type: array
                    items:
                      type: string
              required:
                - name
                - email
                - password
                - state
                - ageRange
      responses:
        '200':
          description: Etapa 1 concluída
          content:
            application/json:
              example:
                message: "Etapa 1 concluída com sucesso."
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  email: ["O e-mail informado já está em uso"]
                  password: ["A senha deve ter no mínimo 8 caracteres."]
  /api/register/partner:
    post:
      summary: Cadastro de parceiro
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do parceiro
                email:
                  type: string
                  format: email
                  description: E-mail do parceiro
                description:
                  type: string
                  description: Descrição sobre o parceiro
                logo:
                  type: string
                  format: binary
                  description: Arquivo de imagem representando o parceiro
                instagram:
                  type: string
                  format: uri
                  nullable: true
                  description: URL opcional do Instagram
                site:
                  type: string
                  format: uri
                  nullable: true
                  description: URL opcional do site do parceiro
                city:
                  type: string
                  description: Cidade onde o parceiro atua
                category:
                  type: number
                  nullable: true
                  description: ID da categoria principal (opcional)
                subcategory:
                  type: number
                  nullable: true
                  description: ID da subcategoria (opcional)
                routes:
                  type: string
                  description: Descrição das rotas relacionadas
                circuits:
                  type: string
                  description: Descrição dos circuitos relacionados
                attractions:
                  type: string
                  description: Descrição das atrações relacionadas
                events:
                  type: array
                  nullable: true
                  description: Lista de eventos do parceiro
                  items:
                    type: object
                    properties:
                      description:
                        type: string
                        description: Descrição do evento
                      image:
                        type: string
                        format: binary
                        nullable: true
                        description: Imagem do evento
                      externalLink:
                        type: string
                        format: uri
                        nullable: true
                        description: Link externo relacionado ao evento
                    required:
                      - description
              required:
                - name
                - email
                - description
                - logo
                - state
                - city
                - routes
                - circuits
                - attractions
      responses:
        '200':
          description: Cadastro concluído
          content:
            application/json:
              example:
                message: "O parceiro foi cadastrado com sucesso!"
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  email: ["O e-mail informado já está em uso"]
                  logo: ["Selecione um arquivo válido"]
  /api/partners:
    get:
      summary: Lista de parceiros
      description: Retorna uma lista de parceiros com filtros opcionais
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: Palavra-chave para busca (nome, cidade ou estado do parceiro)

        - in: query
          name: city[]
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filtra os parceiros pelos IDs das cidades (ex: ?city[]=1&city[]=2)

        - in: query
          name: categories[]
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filtra os parceiros pelas categorias (IDs) especificadas (ex: ?categories[]=3&categories[]=5)

        - in: query
          name: subcategories[]
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: Filtra os parceiros pelas subcategorias (IDs) especificadas (ex: ?subcategories[]=7&subcategories[]=8)

      responses:
        '200':
          description: Lista de parceiros
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      example: 1
                    logo:
                      type: string
                      example: "https://picsum.photos/200/300"
                    name:
                      type: string
                      example: "Fazenda Boa Vista"
                    city:
                      type: string
                      example: "Vargem Grande"
                    state:
                      type: string
                      example: "Rio de Janeiro"
                    editable:
                      type: boolean
                      example: true
                    pendingApproval:
                      type: boolean
                      example: true
              example:
                - id: 1
                  logo: "https://picsum.photos/200/300"
                  name: "Fazenda Boa Vista"
                  city: "Vargem Grande"
                  state: "Rio de Janeiro"
                  editable: true
                  pendingApproval: true
                - id: 2
                  logo: "https://picsum.photos/200/300"
                  name: "Sítio Bela Vista"
                  city: "Petrópolis"
                  state: "Rio de Janeiro"
                  editable: false
                  pendingApproval: false
  /api/partners/{id}:
    get:
      summary: Obter detalhes completos de um parceiro
      description: Retorna as informações detalhadas de um parceiro, incluindo dados de contato, localização, categorias, redes sociais e eventos (opcionais) associados.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID do parceiro
      responses:
        '200':
          description: Detalhes do parceiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  logo:
                    type: string
                    format: uri
                  city:
                    type: string
                  uf:
                    type: string
                  category:
                    type: string
                    description: Categoria principal do parceiro (ex: Fazenda, Sítio, Pousada, Cabana)
                  subcategory:
                    type: string
                    description: Subcategoria do parceiro (ex: Ecológica, Histórica, Gastronômica, Aventura)
                  description:
                    type: string
                  email:
                    type: string
                    format: email
                  routes:
                    type: string
                    description: Rotas ou caminhos turísticos relacionados ao parceiro
                  circuits:
                    type: string
                    description: Circuitos associados ao parceiro
                  attractions:
                    type: string
                    description: Atrações ou pontos de interesse próximos
                  instagram:
                    type: string
                    format: uri
                    nullable: true
                    description: URL do perfil do Instagram (opcional)
                  website:
                    type: string
                    format: uri
                    nullable: true
                    description: Website do parceiro (opcional)
                  events:
                    type: array
                    nullable: true
                    description: Lista de eventos associados ao parceiro (opcional)
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        description:
                          type: string
                        externalLink:
                          type: string
                          format: uri
              examples:
                example1:
                  value:
                    id: 1
                    name: "Pousada Caminho Verde"
                    logo: "https://picsum.photos/seed/partner1/200/300"
                    city: "Teresópolis"
                    uf: "RJ"
                    category: "Pousada"
                    subcategory: "Ecológica"
                    description: "A Pousada Caminho Verde oferece hospedagem tranquila em meio à natureza, com trilhas e culinária regional."
                    email: "contato@caminhoverde.com"
                    routes: "Rota das Montanhas"
                    circuits: "Circuito Verde Serrano"
                    attractions: "Cachoeira dos Frades, Mirante da Serra"
                    instagram: "https://www.instagram.com/caminhoverde/"
                    website: "https://caminhoverde.com/"
                    events:
                      - id: 1
                        name: "Festival da Serra"
                        description: "Evento gastronômico com produtos locais e música ao vivo."
                        externalLink: "https://www.google.com.br/"
                      - id: 2
                        name: "Trilha Ecológica Noturna"
                        description: "Passeio guiado pela mata com observação de fauna e flora noturna."
                        externalLink: "https://www.google.com.br/"
                example2:
                  value:
                    id: 2
                    name: "Sítio Horizonte Azul"
                    logo: "https://picsum.photos/seed/partner2/200/300"
                    city: "Paraty"
                    uf: "RJ"
                    category: "Sítio"
                    subcategory: "Histórica"
                    description: "O Sítio Horizonte Azul é um refúgio histórico com produção artesanal e belas paisagens."
                    email: "contato@horizonteazul.com"
                    routes: "Rota Colonial"
                    circuits: "Circuito Histórico do Litoral"
                    attractions: "Centro Histórico de Paraty, Praia do Sono"
                    instagram: null
                    website: null
                    events: null
        '404':
          description: Parceiro não encontrado
          content:
            application/json:
              example:
                message: "Parceiro não encontrado"
  /api/partners/{id}:
    put:
      summary: Atualiza os dados de um parceiro
      description: Atualiza as informações de um parceiro existente com base no ID fornecido.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID do parceiro a ser atualizado
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do parceiro
                email:
                  type: string
                  format: email
                  description: E-mail do parceiro
                description:
                  type: string
                  description: Descrição sobre o parceiro
                logo:
                  type: string
                  format: binary
                  nullable: true
                  description: Novo arquivo de imagem (opcional para atualização)
                instagram:
                  type: string
                  format: uri
                  nullable: true
                  description: URL opcional do Instagram
                site:
                  type: string
                  format: uri
                  nullable: true
                  description: URL opcional do site do parceiro
                city:
                  type: string
                  description: Cidade onde o parceiro atua
                category:
                  type: number
                  nullable: true
                  description: ID da categoria principal (opcional)
                subcategory:
                  type: number
                  nullable: true
                  description: ID da subcategoria (opcional)
                routes:
                  type: string
                  description: Descrição das rotas relacionadas
                circuits:
                  type: string
                  description: Descrição dos circuitos relacionados
                attractions:
                  type: string
                  description: Descrição das atrações relacionadas
                events:
                  type: array
                  nullable: true
                  description: Lista de eventos atualizados do parceiro
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                        nullable: true
                        description: ID do evento (obrigatório para atualização; omitido para novos)
                      description:
                        type: string
                        description: Descrição do evento
                      image:
                        type: string
                        format: binary
                        nullable: true
                        description: Nova imagem do evento (opcional)
                      externalLink:
                        type: string
                        format: uri
                        nullable: true
                        description: Link externo relacionado ao evento
                    required:
                      - description
              required:
                - name
                - email
                - description
                - city
                - routes
                - circuits
                - attractions
      responses:
        '200':
          description: Dados do parceiro atualizados com sucesso
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  email: ["O e-mail informado já está em uso"]
                  logo: ["Selecione um arquivo válido"]
        '404':
          description: Parceiro não encontrado
        '500':
          description: Erro interno do servidor
  /api/register/categories:
    post:
      summary: Cadastro - Etapa 2 (Categoria/Subcategorias)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                category:
                  type: number
                  description: "ID da categoria selecionada"
                subcategories:
                  type: array
                  items:
                    type: number
                    description: "IDs das subcategorias selecionadas"
              required:
                - category
      responses:
        '200':
          description: Etapa 2 concluída
          content:
            application/json:
              example:
                message: "Etapa 2 concluída com sucesso."
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  category: ["O campo categoria é obrigatório."]
                  subcategories: ["O campo subcategorias é obrigatório."]
  /api/register/finish:
    post:
      summary: Cadastro final - Recebe todos os dados e cria o usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                # Etapa 1
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                state:
                  type: string
                ageRange:
                  type: string
                travelWith:
                    type: array
                    items:
                      type: string
                # Etapa 2
                category:
                  type: number
                  description: "ID da categoria selecionada"
                subcategories:
                  type: array
                  items:
                    type: number
                    description: "IDs das subcategorias selecionadas"
                # Etapa 3
                terms:
                  type: boolean
                  description: "Aceite dos termos de uso"
              required:
                - name
                - email
                - password
                - state
                - ageRange
                - category
                - terms
      responses:
        '201':
          description: Usuário cadastrado com sucesso
          content:
            application/json:
              example:
                id: 1
                name: "Alice"
                avatar: "https://picsum.photos/200/300"
                email: "alice@email.com"
                state: "SP"
                ageRange: "FROM_18_TO_29"
                travelWith: ["FRIENDS"]
                category: 3
                subcategories: [5, 6]
                token: '9f4e3c2a1b6d8e0f3c4d5a6b7e8f9a0b'
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  name: ["O campo nome é obrigatório."]
                  email: ["O e-mail informado já está em uso"]
                  password: ["A senha deve ter no mínimo 8 caracteres."]
                  category: ["O campo categoria é obrigatório."]
                  subcategories: ["Selecione ao menos uma subcategoria."]
                  termsAccepted: ["Você deve aceitar os termos para continuar."]
  /api/properties:
    get:
      summary: Lista de propriedades rurais
      description: Retorna uma lista de propriedades rurais com possibilidade de aplicar filtros.
      parameters:
        - in: query
          name: keyword
          schema:
            type: string
          description: Palavra-chave para busca
        - in: query
          name: categories[]
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: IDs das categorias
        - in: query
          name: subcategories[]
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
          description: IDs das subcategorias
        - in: query
          name: propertyLocationId
          schema:
            type: integer
          description: ID da cidade da propriedade
        - in: query
          name: useCurrentLocation
          schema:
            type: boolean
          description: Se deve usar a localização atual do usuário
        - in: query
          name: isFavorite
          schema:
            type: boolean
          description: Se deve retornar apenas propriedades que estão nos favoritos do usuário
      responses:
        '200':
          description: Lista de propriedades rurais
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    logo:
                      type: string
                    type:
                      type: string
                      example: "Cabana"
                    rating:
                      type: number
                      format: float
                      minimum: 0
                      maximum: 5
                    location:
                      type: object
                      properties:
                        city:
                          type: string
                          example: "Gramado"
                        coordinates:
                          type: object
                          properties:
                            lat:
                              type: number
                              example: -29.3796
                            lng:
                              type: number
                              example: -50.8741
              example:
                - id: 1
                  name: "Cabana do Lago"
                  logo: "https://picsum.photos/200/300"
                  type: "Cabana"
                  rating: 4.8
                  location:
                    city: "Gramado"
                    coordinates:
                      lat: -29.3796
                      lng: -50.8741
                - id: 2
                  name: "Casa da Serra"
                  logo: "https://picsum.photos/200/300"
                  type: "Casa"
                  rating: 3.5
                  location:
                    city: "Canela"
                    coordinates:
                      lat: -29.3562
                      lng: -50.8111
