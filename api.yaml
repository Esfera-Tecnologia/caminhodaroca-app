            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  filePath:
                    type: string
        '401':
          description: Usuário não autenticado
          content:
            application/json:
              example:
                message: "Usuário não autenticado"
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                message: "Os dados informados são inválidos"
                errors:
                  photo: ["A foto deve ter no máximo 2 mb."]